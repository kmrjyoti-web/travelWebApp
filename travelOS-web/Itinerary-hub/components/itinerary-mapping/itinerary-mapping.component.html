<div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-slate-100 animate-fade-in">
  <header class="border-b border-slate-200 pb-4 mb-6 flex justify-between items-center">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Itinerary Mapping</h2>
      <p class="mt-1 text-slate-600">Categorize this itinerary for internal tracking and organization.</p>
    </div>
    <button (click)="saveMapping()" [disabled]="saveStatus() !== 'idle'" [class]="saveStatus() === 'saved' ? 'bg-green-100 text-green-800' : 'bg-indigo-600 text-white'" class="px-5 py-2 text-sm font-medium rounded-lg shadow-sm transition-colors duration-300 disabled:bg-indigo-400">
       @if(saveStatus() === 'saved') {
        <span>✓ Saved!</span>
      } @else if (saveStatus() === 'saving') {
        <span>Saving...</span>
      } @else {
        <span>Save Mapping</span>
      }
    </button>
  </header>

  <div class="space-y-3">
    @for(category of categories(); track category.id) {
      <div class="border border-slate-200 rounded-lg">
        <button (click)="toggleCategory(category.code)" class="w-full flex justify-between items-center p-4 text-left bg-slate-50 hover:bg-slate-100 transition-colors">
          <h3 class="font-semibold text-slate-800">{{ category.name }}</h3>
          <svg [class.rotate-180]="openCategories()[category.code]" class="w-5 h-5 text-slate-500 transition-transform duration-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        
        @if (openCategories()[category.code]) {
          <div class="p-4 grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-4 border-t border-slate-200">
            @for(item of category.items; track item.id) {
              <label [for]="item.id" class="flex items-start p-3 bg-white rounded-md border border-slate-200 hover:border-indigo-400 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 transition-colors cursor-pointer">
                <input [id]="item.id" type="checkbox" [checked]="isChecked(category.code, item.code)" (change)="onCheckboxChange(category.code, item.code, $event)" class="h-4 w-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 mt-0.5 shrink-0">
                <div class="ml-3 text-sm">
                  <span class="font-medium text-slate-800">{{ item.name }}</span>
                  <p class="text-slate-500">{{ item.description }}</p>
                </div>
              </label>
            }
          </div>
        }
      </div>
    }
  </div>
</div>
