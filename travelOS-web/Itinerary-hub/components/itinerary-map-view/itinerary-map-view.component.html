<div class="relative w-full h-full rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
  <div #mapContainer class="w-full h-full"></div>
  
  <!-- Top Controls Overlay -->
  <div class="absolute top-4 left-4 right-4 flex justify-between items-start gap-4">
    <!-- Day Navigation -->
    <div class="bg-white p-2 rounded-lg shadow-lg flex items-center gap-2 border border-slate-200">
      <button (click)="goToDay('prev')" [disabled]="currentDayIndex() === 0" 
              class="px-3 py-1.5 text-sm font-medium rounded-md bg-white border border-slate-300 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        Prev
      </button>
      
      @if (trip().itinerary.days[currentDayIndex()]; as day) {
        <div class="text-center px-2">
          <p class="font-bold text-slate-800 text-sm">Day {{ day.day }}</p>
          <p class="text-xs text-slate-600 truncate max-w-[150px]">{{ day.theme }}</p>
        </div>
      }

      <button (click)="goToDay('next')" [disabled]="currentDayIndex() >= trip().itinerary.days.length - 1" 
              class="px-3 py-1.5 text-sm font-medium rounded-md bg-white border border-slate-300 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 transition-colors">
        Next
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>

    <!-- View Toggle -->
    <button (click)="viewChanged.emit()" class="bg-white px-4 py-2 text-sm font-medium rounded-lg shadow-lg flex items-center gap-2 border border-slate-200 hover:bg-slate-100 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
        List View
    </button>
  </div>
  
  <!-- Bottom Legend/Info Overlay -->
  <div class="absolute bottom-4 left-4 bg-white p-3 rounded-lg shadow-lg border border-slate-200 max-w-xs">
    <h4 class="font-bold text-sm text-slate-800 mb-2">Legend</h4>
    <div class="flex items-center gap-2 text-xs text-slate-600 mb-1">
        <span class="w-3 h-3 rounded-full border-2 border-white shadow" style="background-color: #4A90E2"></span>
        <span>Itinerary Activities</span>
    </div>
    <div class="flex items-center gap-2 text-xs text-slate-600">
        <span class="w-3 h-3 rounded-full border-2 border-white shadow" style="background-color: #10B981"></span>
        <span>Local Highlights</span>
    </div>
    @if(isHighlightsLoading()) {
        <div class="flex items-center gap-2 text-xs text-slate-500 mt-2 animate-pulse">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span>Finding highlights...</span>
        </div>
    }
  </div>
</div>
